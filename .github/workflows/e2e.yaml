name: E2E Tests

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  e2e:
    name: "Run Playwright e2e tests"
    runs-on: norpan-kvm2

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Clone or update cnaas-nms
        run: |
          if [ -d /tmp/cnaas-nms ]; then
            git -C /tmp/cnaas-nms switch develop
            git -C /tmp/cnaas-nms pull
          else
            git clone --depth 1 --branch develop https://github.com/SUNET/cnaas-nms.git /tmp/cnaas-nms
          fi

      - name: Build backend Docker images
        working-directory: /tmp/cnaas-nms/docker
        run: docker compose -f docker-compose.yaml build

      - name: Start VMs
        run: ~/start-vms.sh

      - name: Start backend
        run: ./e2e/start-backend.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright firefox
        run: npx playwright install firefox --with-deps

      - name: Run Playwright e2e tests (ZTP)
        run: npm run test:e2e:ztp
        env:
          CI: "true"

      - name: Run Playwright e2e tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Check running containers
        run: docker ps -a
        if: failure()

      - name: Show init logs
        run: docker logs cnaas-e2e-init 2>&1 || true
        if: failure()

      - name: Show API logs
        run: docker logs cnaas-e2e-api --tail 100 2>&1 || true
        if: failure()

      - name: Show DHCP logs
        run: docker logs cnaas-e2e-dhcpd --tail 50 2>&1 || true
        if: failure()

      - name: Show postgres logs
        run: docker logs cnaas-e2e-postgres --tail 50 2>&1 || true
        if: failure()

      - name: Stop backend
        run: ./e2e/stop-backend.sh
        if: always()

      - name: Stop VMs
        run: ~/stop-vms.sh
        if: always()
