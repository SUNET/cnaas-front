worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
       worker_connections 1024;
}

http {
        # Sanitize token from request
        map $request $clean_request {
                "~*^(?<before>.*)token=[^&]*(?<after>.*)" "${before}token=***${after}";
                default $request;
        }
        # Sanitize token from http_referer
        map $http_referer $clean_http_referer {
                "~*^(?<before>.*)token=[^&]*(?<after>.*)" "${before}token=***${after}";
                default $http_referer;
        }

        log_format sanitized '$remote_addr - $remote_user [$time_local] '
                        '"$clean_request" $status $body_bytes_sent '
                        '"$clean_http_referer" "$http_user_agent"';

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # log
        access_log /var/log/nginx/access.log sanitized;
        error_log /var/log/nginx/error.log;

        # optimize static file serving
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;

        types_hash_max_size 2048;
        ssl_protocols TLSv1.2 TLSv1.3; # Dropping TLSv1.0/1.1, ref: RFC 8996
        ssl_prefer_server_ciphers on;

        # gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
        gzip_min_length 1000;
        gzip_vary on;

        # include nginx_app.conf etc
        include /etc/nginx/conf.d/*.conf;
}
